<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" role="img" aria-label="Meditation illustration">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6C47FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6C47FF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6C47FF"/>
      <stop offset="100%" stop-color="#4A30CC"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C47FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6C47FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#sky)" rx="12"/>

  <!-- Glow behind figure -->
  <circle cx="150" cy="90" r="80" fill="url(#glowGrad)"/>

  <!-- Ground / cushion -->
  <ellipse cx="150" cy="170" rx="70" ry="8" fill="#8B9D5B" opacity="0.15"/>
  <ellipse cx="150" cy="168" rx="55" ry="5" fill="#8B9D5B" opacity="0.1"/>

  <!-- Meditating figure -->
  <g transform="translate(150, 115)">
    <!-- Body -->
    <path d="M-12,25 Q-14,10 -8,-5 Q0,-20 8,-5 Q14,10 12,25" fill="url(#bodyGrad)" opacity="0.9"/>

    <!-- Head -->
    <circle cx="0" cy="-22" r="10" fill="#1E2235" opacity="0.8"/>

    <!-- Crossed legs (lotus) -->
    <ellipse cx="-18" cy="30" rx="12" ry="5" fill="#8B9D5B" opacity="0.4" transform="rotate(-15,-18,30)"/>
    <ellipse cx="18" cy="30" rx="12" ry="5" fill="#8B9D5B" opacity="0.4" transform="rotate(15,18,30)"/>
  </g>

  <!-- Sound waves / vibration lines -->
  <g stroke="#6C47FF" stroke-width="0.8" fill="none" opacity="0.15" stroke-linecap="round">
    <path d="M60,90 Q65,85 60,80"/>
    <path d="M55,95 Q62,85 55,75"/>
    <path d="M240,90 Q235,85 240,80"/>
    <path d="M245,95 Q238,85 245,75"/>
  </g>

  <!-- Floating particles -->
  <circle cx="80" cy="50" r="2" fill="#6C47FF" opacity="0.12"/>
  <circle cx="220" cy="40" r="1.5" fill="#6C47FF" opacity="0.1"/>
  <circle cx="100" cy="30" r="1" fill="#8B9D5B" opacity="0.08"/>
  <circle cx="200" cy="55" r="1.5" fill="#8B9D5B" opacity="0.1"/>
</svg>
