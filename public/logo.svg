<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" role="img" aria-labelledby="vipa-title vipa-desc">
  <title id="vipa-title">Vipa Cursos Logo</title>
  <desc id="vipa-desc">Dharma wheel with the text Vipa Cursos — a Vipassana meditation course tracker</desc>

  <defs>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C47FF"/>
      <stop offset="100%" stop-color="#4A30CC"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B9D5B"/>
      <stop offset="100%" stop-color="#6B7D3B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dharma Wheel logo mark -->
  <g id="logo-mark" transform="translate(4, 6)">
    <!-- Subtle lotus base -->
    <ellipse cx="30" cy="53" rx="16" ry="4" fill="url(#accentGrad)" opacity="0.2"/>
    <ellipse cx="30" cy="52" rx="13" ry="3" fill="url(#accentGrad)" opacity="0.1"/>

    <!-- Outer glow -->
    <circle cx="30" cy="30" r="28" fill="#6C47FF" opacity="0.04"/>

    <!-- Outer rim -->
    <circle cx="30" cy="30" r="22" fill="none" stroke="url(#wheelGrad)" stroke-width="2.5" filter="url(#glow)"/>

    <!-- Inner rim -->
    <circle cx="30" cy="30" r="6" fill="none" stroke="url(#wheelGrad)" stroke-width="2"/>

    <!-- Hub -->
    <circle cx="30" cy="30" r="3.5" fill="url(#wheelGrad)"/>

    <!-- 8 spokes (Noble Eightfold Path) -->
    <g stroke="url(#wheelGrad)" stroke-width="1.8" stroke-linecap="round">
      <!-- Right view / Right intention -->
      <line x1="30" y1="14" x2="30" y2="24"/>
      <!-- Right speech / Right action -->
      <line x1="44" y1="20" x2="38" y2="26"/>
      <!-- Right livelihood -->
      <line x1="44" y1="36" x2="36" y2="32"/>
      <!-- Right effort -->
      <line x1="30" y1="42" x2="30" y2="36"/>
      <!-- Right mindfulness -->
      <line x1="16" y1="36" x2="24" y2="32"/>
      <!-- Right concentration -->
      <line x1="16" y1="20" x2="22" y2="26"/>
      <!-- Additional spokes for full 8 -->
      <line x1="38" y1="16" x2="34" y2="22"/>
      <line x1="22" y1="16" x2="26" y2="22"/>
    </g>

    <!-- Small accent dots between spokes (symbolizing the 4 Noble Truths) -->
    <circle cx="30" cy="13" r="1.2" fill="url(#accentGrad)" opacity="0.6"/>
    <circle cx="47" cy="30" r="1.2" fill="url(#accentGrad)" opacity="0.6"/>
    <circle cx="30" cy="47" r="1.2" fill="url(#accentGrad)" opacity="0.6"/>
    <circle cx="13" cy="30" r="1.2" fill="url(#accentGrad)" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g id="wordmark" transform="translate(66, 0)">
    <text x="0" y="32" font-family="'Montserrat', system-ui, sans-serif" font-size="24" font-weight="700" fill="#1E2235" letter-spacing="-0.5">
      Vipa
    </text>
    <text x="70" y="32" font-family="'Montserrat', system-ui, sans-serif" font-size="24" font-weight="300" fill="#6B7280" letter-spacing="-0.5">
      Cursos
    </text>
    <text x="0" y="48" font-family="'Montserrat', system-ui, sans-serif" font-size="9" font-weight="400" fill="#9CA3AF" letter-spacing="2">
      TU VIAJE INTERIOR
    </text>
  </g>
</svg>
