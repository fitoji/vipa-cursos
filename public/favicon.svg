<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Vipa Cursos Dharma wheel icon">
  <defs>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C47FF"/>
      <stop offset="100%" stop-color="#4A30CC"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B9D5B"/>
      <stop offset="100%" stop-color="#6B7D3B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lotus base -->
  <ellipse cx="32" cy="58" rx="18" ry="5" fill="url(#accentGrad)" opacity="0.2"/>
  <ellipse cx="32" cy="57" rx="14" ry="3.5" fill="url(#accentGrad)" opacity="0.1"/>

  <!-- Outer glow -->
  <circle cx="32" cy="30" r="30" fill="#6C47FF" opacity="0.04"/>

  <!-- Outer rim -->
  <circle cx="32" cy="30" r="24" fill="none" stroke="url(#wheelGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner rim -->
  <circle cx="32" cy="30" r="7" fill="none" stroke="url(#wheelGrad)" stroke-width="2.5"/>

  <!-- Hub -->
  <circle cx="32" cy="30" r="4" fill="url(#wheelGrad)"/>

  <!-- 8 spokes -->
  <g stroke="url(#wheelGrad)" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="11" x2="32" y2="23"/>
    <line x1="48" y1="18" x2="39" y2="26"/>
    <line x1="48" y1="38" x2="37" y2="33"/>
    <line x1="32" y1="45" x2="32" y2="37"/>
    <line x1="16" y1="38" x2="27" y2="33"/>
    <line x1="16" y1="18" x2="25" y2="26"/>
    <line x1="40" y1="15" x2="35" y2="23"/>
    <line x1="24" y1="15" x2="29" y2="23"/>
  </g>

  <!-- Accent dots (4 Noble Truths) -->
  <circle cx="32" cy="9" r="1.5" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="53" cy="30" r="1.5" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="32" cy="51" r="1.5" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="11" cy="30" r="1.5" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
