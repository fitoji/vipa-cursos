<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Lotus flower illustration">
  <defs>
    <linearGradient id="petalPurple" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A30CC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6C47FF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="petalGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6B7D3B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B9D5B" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B9D5B" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#6C47FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6C47FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#centerGlow)"/>

  <!-- Water reflection -->
  <ellipse cx="100" cy="185" rx="60" ry="4" fill="#6C47FF" opacity="0.06"/>

  <!-- Stem -->
  <path d="M100,140 Q98,155 100,185" stroke="#8B9D5B" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Outer leaves -->
  <path d="M100,140 Q70,115 60,95 Q65,130 100,140" fill="url(#petalGreen)"/>
  <path d="M100,140 Q130,115 140,95 Q135,130 100,140" fill="url(#petalGreen)"/>

  <!-- Outer petals (back) -->
  <path d="M100,140 Q60,100 75,75 Q85,110 100,140" fill="url(#petalPurple)" opacity="0.5"/>
  <path d="M100,140 Q140,100 125,75 Q115,110 100,140" fill="url(#petalPurple)" opacity="0.5"/>
  <path d="M100,140 Q85,90 100,70 Q115,90 100,140" fill="url(#petalPurple)" opacity="0.4"/>

  <!-- Inner petals (front) -->
  <path d="M100,140 Q50,105 65,80 Q80,115 100,140" fill="url(#petalPurple)" opacity="0.7"/>
  <path d="M100,140 Q150,105 135,80 Q120,115 100,140" fill="url(#petalPurple)" opacity="0.7"/>

  <!-- Center petals -->
  <path d="M100,140 Q80,100 90,75 Q95,110 100,140" fill="url(#petalPurple)" opacity="0.85"/>
  <path d="M100,140 Q120,100 110,75 Q105,110 100,140" fill="url(#petalPurple)" opacity="0.85"/>

  <!-- Lotus center -->
  <ellipse cx="100" cy="105" rx="12" ry="5" fill="#8B9D5B" opacity="0.5"/>

  <!-- Dew drop -->
  <ellipse cx="95" cy="92" rx="2.5" ry="3" fill="#FFFFFF" opacity="0.25"/>
</svg>
